    const origin = ['マカ', '炭鉱'];
    const s = [0x0194FD72,0x79E6C985,0x08DD9701,0x41CFCE91];

    let x = 0;
    let y = 0;
    let z = 0;
    let w = 0;
    let t = 0;
    let f = 0;

    let r0 = 0;
    let r1 = 0;
    let r2 = 0;
    let r3 = 0;
    let r4 = 0;
    let r5 = 0;
    let r6 = 0;

    let currentTable = null;

    const charmKindLabels = {
      blue: "風化したお守り",
      red: "古びたお守り",
      yellow: "光るお守り",
      white: "なぞのお守り"
    };

    function setTable(color) {
      currentTable = charmTables[color];
    }

    function u32(n) {
      return n >>> 0;
    }

    function mod(a, b) {
      return ((a % b) + b) % b;
    }

    function init() {
      x = s[0];
      y = s[1];
      z = s[2];
      w = s[3];
      t = 0;
      f = 0;

      r0 = 0;
      r1 = 0;
      r2 = 0;
      r3 = 0;
      r4 = 0;
      r5 = 0;
      r6 = 0;
    }

    function ascend() {
      t = u32(x ^ (x << 15));
      x = y;
      y = z;
      z = w;
      w = u32(w ^ (w >>> 21) ^ t ^ (t >>> 4));
      f += 1;
    }

    function roll() {
      r0 = r1;
      r1 = r2;
      r2 = r3;
      r3 = r4;
      r4 = r5;
      r5 = r6;
      r6 = w;
      ascend();
    }

    function watch(frame) {
      const d = Math.floor(frame / 2592000);
      const h = Math.floor((frame % 2592000) / 108000);
      const m = Math.floor((frame % 108000) / 1800);
      const sec = Math.floor((frame % 1800) / 30);
      const ff = frame % 30;
      return `${d}d ${h}h ${m}m ${sec}s ${ff}f`;
    }

    function slot(fill, num1) {
      const slotvalue = currentTable.slotvalue;

      if (fill <= 0) {
        return 0;
      }

      if (num1 >= slotvalue[fill - 1][2]) return 3;
      if (num1 >= slotvalue[fill - 1][1]) return 2;
      if (num1 >= slotvalue[fill - 1][0]) return 1;
      return 0;
    }

    function rare(slotNum, fill) {
      const kind = currentTable.kind;
      const num1 = slotNum * 2 + fill;

      switch (kind) {
        case 0:
          return num1 >= 13 ? 10 : num1 >= 8 ? 9 : 8;
        case 1:
          return num1 >= 13 ? 7 : num1 >= 8 ? 6 : 5;
        case 2:
          return num1 >= 8 ? 4 : 3;
        case 3:
          return num1 >= 8 ? 2 : 1;
        default:
          return 0;
      }
    }

    function getCharm(_origin) {
      const c = new Array(8);

      const skill1List = currentTable.skill1;
      const sp1List = currentTable.sp1;
      const skill2List = currentTable.skill2;
      const sp2List = currentTable.sp2;
      const th = currentTable.th;

      const id1 = mod(r0, skill1List.length);
      const id2 = mod(r3, skill2List.length);

      const s1 = sp1List[id1][1];
      const s2 = sp2List[id2][1];

      c[0] = skill1List[id1];

      const tmp1 = mod(r1, sp1List[id1][1] - sp1List[id1][0] + 1) + sp1List[id1][0];
      c[1] = tmp1;

      let tmp2 = 0;
      let q4 = 0;
      let q5 = 0;

      if (mod(r2, 100) >= th) {
        c[2] = skill2List[id2];

        if (_origin === 1 && mod(r4, 2) === 0) {
          q4 = r5;
          q5 = r6;
          tmp2 = mod(q4, sp2List[id2][0] + 1) - sp2List[id2][0];
        } else {
          if (_origin === 1) {
            q4 = r5;
            q5 = r6;
          } else {
            q4 = r4;
            q5 = r5;
          }
          tmp2 = mod(q4, sp2List[id2][1]) + 1;
        }

        c[3] = tmp2;

        if (skill1List[id1] === skill2List[id2] || tmp2 < 0) {
          tmp2 = 0;
        }
      } else {
        c[2] = null;
        c[3] = 0;
        q5 = r3;
      }

      const tmp0 = Math.floor(((tmp1 * s2 + tmp2 * s1) * 10) / (s1 * s2));

      c[4] = slot(tmp0, mod(q5, 100));
      c[5] = tmp0;
      c[6] = mod(q5, 100);
      c[7] = rare(c[4], c[5]);

      return c;
    }

    function formatCharmLine(relativeIndex, c) {
      const left = String(relativeIndex).padStart(4, " ");

      const skill1Name = skill[c[0]];
      const sp1 = String(c[1]).padStart(2, " ");

      let skill2Name;
      let sp2;

      if (c[2] === null) {
        skill2Name = "◯◯";
        sp2 = "00";
      } else {
        skill2Name = skill[c[2]];
        sp2 = String(c[3]).padStart(2, "0");
      }

      return `${left}  ${skill1Name}  ${sp1} ${skill2Name}  ${sp2} S${c[4]} RARE${c[7]}`;
    }

    async function listAroundFramesAsync(centerFrame, radius, originValue, chunkSize = 2000, onProgress = null) {
  init();

  const results = [];
  const startFrame = Math.max(0, centerFrame - radius);
  const endFrame = centerFrame + radius;
  const totalCount = endFrame - startFrame + 1;

  // 開始フレーム直前まで進める
  for (let i = 0; i < startFrame; i++) {
    roll();
  }

  for (let start = 0; start < totalCount; start += chunkSize) {
    const end = Math.min(start + chunkSize, totalCount);

    for (let i = start; i < end; i++) {
      // 検索時と同じ順序にする
      roll();
      const c = getCharm(originValue);

      const frame = f - 7;

      results.push({
        frame,
        watch: watch(frame),
        charm: c,
        line: formatCharmLine(frame, centerFrame, c)
      });
    }

    if (onProgress) {
      onProgress(end, totalCount);
    }

    await new Promise(requestAnimationFrame);
  }

  return results;
}

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, (m) => {
        return {
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;"
        }[m];
      });
    }

    async function main() {
      const result = document.getElementById("result");
      const status = document.getElementById("status");
      const meta = document.getElementById("meta");

      const params = new URLSearchParams(location.search);
      const frame = Number(params.get("frame"));
      const table = params.get("table");
      const originName = params.get("origin");

      if (!Number.isInteger(frame) || frame < 0) {
        status.innerHTML = `<span class="error">frame パラメータが不正です。</span>`;
        return;
      }

      if (!table || !charmTables[table]) {
        status.innerHTML = `<span class="error">table パラメータが不正です。</span>`;
        return;
      }

      const originValue = origin.indexOf(originName);
      if (originValue === -1) {
        status.innerHTML = `<span class="error">origin パラメータが不正です。</span>`;
        return;
      }

      setTable(table);

      if (table === "yellow" || table === "white") {
        status.innerHTML = `<span class="error">このお守りは未対応です。</span>`;
        return;
      }

      meta.innerHTML = `
        <div>中心フレーム: ${frame}</div>
        <div>時間: ${escapeHtml(watch(frame))}</div>
        <div>テーブル: ${escapeHtml(charmKindLabels[table])}</div>
        <div>抽選元: ${escapeHtml(originName)}</div>
        <div>表示範囲: ${Math.max(0, frame - 20)} ～ ${frame + 20}</div>
      `;

      status.textContent = "前後表示を生成中...";

      const aroundResults = await listAroundFramesAsync(
        frame,
        20,
        originValue,
        2000,
        (done, total) => {
          status.textContent = `前後表示を生成中... ${done}/${total}`;
        }
      );

      const html = aroundResults.map((r) => {
        const line = escapeHtml(r.line);
        if (r.relativeIndex === 0) {
          return `<div class="center-line">${line}  ← 中心</div>`;
        }
        return `<div>${line}</div>`;
      }).join("");

      result.innerHTML = html;
      status.textContent = `表示完了 (${aroundResults.length}件)`;
    }

    main().catch((error) => {
      document.getElementById("status").innerHTML =
        `<span class="error">エラー: ${escapeHtml(error.message)}</span>`;
      console.error(error);
    });
