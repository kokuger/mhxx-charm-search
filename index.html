<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MHXX Charm Tool</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1>こくじゃーの MHXX 護石フレーム確認ツール</h1>
    <h2>
      <a href="https://www.youtube.com/@%E3%81%93%E3%81%8F%E3%81%98%E3%82%83%E3%83%BC" target="_blank">チャンネル登録</a>
      しないで使う人は神おま出ない呪いかけますw
    </h2>
    <h2>
      一部スキルは略称で扱います
      <a href="skills.html" target="_blank">詳細</a>
    </h2>

    <div class="row">
      <div class="form-group">
        <label for="skill1">第一スキル</label>
        <input type="text" id="skill1" list="skillList" value="連撃">
      </div>

      <div class="form-group">
        <label for="skill1Value">第一スキル値</label>
        <select id="skill1Value">
          <option value="">選択してください</option>
          <option value="0">0</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4" selected>4</option>
          <option value="5">5</option>
          <option value="6">6</option>
          <option value="7">7</option>
          <option value="8">8</option>
          <option value="9">9</option>
          <option value="10">10</option>
          <option value="11">11</option>
          <option value="12">12</option>
          <option value="13">13</option>
          <option value="14">14</option>
          <option value="15">15</option>
        </select>
      </div>
    </div>

    <div class="row">
      <div class="form-group">
        <label for="skill2">第二スキル</label>
        <input type="text" id="skill2" list="skillList" value="痛撃">
      </div>

      <div class="form-group">
        <label for="skill2Value">第二スキル値</label>
        <select id="skill2Value">
          <option value="">選択してください</option>
          <option value="0">0</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5" selected>5</option>
          <option value="6">6</option>
          <option value="7">7</option>
          <option value="8">8</option>
          <option value="9">9</option>
          <option value="10">10</option>
          <option value="11">11</option>
          <option value="12">12</option>
          <option value="13">13</option>
          <option value="14">14</option>
          <option value="15">15</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label for="slot">スロット数</label>
      <select id="slot">
        <option value="0">0</option>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3" selected>3</option>
      </select>
    </div>
    
    <div class="form-group">
      <label>抽選元</label>
      <div class="toggle-group">
        <input type="radio" id="originMaka" name="originType" value="マカ" checked>
        <label for="originMaka" class="toggle-option">マカ</label>
    
        <input type="radio" id="originTankou" name="originType" value="炭鉱">
        <label for="originTankou" class="toggle-option">炭鉱</label>
      </div>
    </div>

    <div class="form-group">
      <label for="charmKind">お守り種類</label>
    
      <select id="charmKind">
        <option value="blue" selected>風化したお守り</option>
        <option value="red">古びたお守り(動作確認してないw)</option>
        <option value="yellow">光るお守り(動かないw)</option>
        <option value="white">なぞのお守り(動かないw)</option>
      </select>
    </div>

    
    <div class="row">
      <div class="form-group">
        <label for="startFrame">検索開始フレーム</label>
        <input type="number" id="startFrame" value="0" min="0" step="1">
      </div>
      <div class="form-group">
        <label for="maxFrames">検索フレーム数</label>
        <input type="number" id="maxFrames" value="100000" min="1" step="1000">
      </div>
    </div>

    <div class="form-group">
      <label for="displayLimit">表示件数</label>
      <input type="number" id="displayLimit" value="10" min="1" step="1">
    </div>

    <div class="form-group">
      <label>表示モード</label>
    
      <div class="toggle-group">
        <input type="radio" id="modeSearch" name="displayMode" value="search" checked>
        <label for="modeSearch" class="toggle-option">検索</label>
      </div>
    </div>
    
    <p>・切れ味7、達人10、S3を検索するには100000000フレームの検索が必要、私のスマホだと1分くらい検索に時間かかります</p>
    <p>・リンクになっているframeをタップすると、そのframeの前後20件のお守りを別ページで表示します</p>
    
    <button id="checkButton">検索</button>

    <div id="searchStatus" class="search-status"></div>
    
    <div id="result" class="result-box">ここに検索結果が表示されます</div>
    <datalist id="skillList"></datalist>

    <footer>
      This tool uses code from
      <a href="https://github.com/apmnnn/mhxx-rng">mhxx-rng</a>
      by apmnnn.
      Licensed under the MIT License.
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
